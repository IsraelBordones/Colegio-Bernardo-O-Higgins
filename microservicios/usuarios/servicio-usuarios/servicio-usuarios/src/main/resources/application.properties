spring.application.name=servicio-usuarios
spring.datasource.url=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=colegio
spring.datasource.password=colegio
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Ejecutar data.sql en cada arranque (seed de demo)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=8081

# Logging extra para diagnosticar el 400 del endpoint /api/usuarios/login
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http=DEBUG
logging.level.com.fasterxml.jackson=DEBUG
logging.level.org.springframework.security=DEBUG



