spring.application.name=servicio-asistencia
server.port=8083
spring.datasource.url=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=colegio
spring.datasource.password=colegio
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Ejecutar data.sql en cada arranque (seed de demo)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true



