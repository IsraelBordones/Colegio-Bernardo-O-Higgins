spring.application.name=servicio-asistencia
server.port=8083
spring.datasource.url=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=colegio
spring.datasource.password=colegio
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Seed de demo vía AsistenciaDataSeeder (data.sql solo contiene comentarios)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Evitar Condition Evaluation Report en bucle y ruido DEBUG en tests/arranque
debug=false
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO



