version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_colegio
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=colegio
      - MYSQL_USER=colegio
      - MYSQL_PASSWORD=colegio
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

  usuarios-ms:
    # Ajustado: entramos a la subcarpeta donde está el Dockerfile
    build: ./microservicios/usuarios/servicio-usuarios/servicio-usuarios
    container_name: usuarios-ms
    ports:
      - "8081:8081"
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=colegio
      - SPRING_DATASOURCE_PASSWORD=colegio
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  academico-ms:
    # Ajustado según tu ruta de find
    build: ./microservicios/academico/servicio-academico
    container_name: academico-ms
    ports:
      - "8082:8082"
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=colegio
      - SPRING_DATASOURCE_PASSWORD=colegio
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  asistencia-ms:
    # Ajustado según tu ruta de find
    build: ./microservicios/asistencia/servicio-asistencia
    container_name: asistencia-ms
    ports:
      - "8083:8083"
    depends_on:
      - mysql
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=colegio
      - SPRING_DATASOURCE_PASSWORD=colegio
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  bff:
    # Ajustado: entramos a la subcarpeta bff-colegio
    build: ./bff/bff-colegio
    container_name: bff-colegio
    ports:
      - "8080:8080"
    depends_on:
      - usuarios-ms
      - academico-ms
      - asistencia-ms

volumes:
  mysql_data:
    driver: local
