services:
  mysql:
    image: mysql:8.0
    container_name: mysql_colegio
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=colegio
      - MYSQL_USER=colegio
      - MYSQL_PASSWORD=colegio
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    # Healthcheck: Docker espera a que MySQL acepte conexiones reales
    # antes de marcar el contenedor como "healthy"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "colegio", "-pcolegio"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  usuarios-ms:
    build: ./microservicios/usuarios/servicio-usuarios/servicio-usuarios
    container_name: usuarios-ms
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy   # <-- espera el healthcheck, no solo el arranque
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=colegio
      - SPRING_DATASOURCE_PASSWORD=colegio
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  academico-ms:
    build: ./microservicios/academico/servicio-academico
    container_name: academico-ms
    ports:
      - "9082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=colegio
      - SPRING_DATASOURCE_PASSWORD=colegio
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  asistencia-ms:
    build: ./microservicios/asistencia/servicio-asistencia
    container_name: asistencia-ms
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/colegio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=colegio
      - SPRING_DATASOURCE_PASSWORD=colegio
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  bff:
    build: ./bff/bff-colegio
    container_name: bff-colegio
    ports:
      - "8080:8080"
    depends_on:
      - usuarios-ms
      - academico-ms
      - asistencia-ms

volumes:
  mysql_data:
    driver: local